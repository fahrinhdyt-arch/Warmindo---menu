<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warmindo — Pesan di Sini!</title>
  <link rel="icon" href="/warmindo favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET & VARIABLES ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #D42B2B;
      --red-dark:   #A81C1C;
      --red-light:  #FF5252;
      --red-bg:     #FFF5F5;
      --white:      #FFFFFF;
      --cream:      #FFFDF9;
      --gray-light: #F3F3F3;
      --gray:       #888;
      --dark:       #1A1A1A;
      --gold:       #F5A623;
      --shadow:     0 4px 20px rgba(212,43,43,.14);
      --radius:     16px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== HERO HEADER ===== */
    header {
      background: var(--red);
      color: var(--white);
      padding: 0;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 18px,
        rgba(255,255,255,.045) 18px,
        rgba(255,255,255,.045) 36px
      );
      pointer-events: none;
    }
    .header-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 28px;
      gap: 6px;
    }
    .logo-badge {
      background: var(--white);
      color: var(--red);
      font-family: 'Fredoka One', cursive;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 4px;
      box-shadow: 0 2px 10px rgba(0,0,0,.15);
    }
    header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.4rem, 8vw, 3.2rem);
      line-height: 1;
      text-shadow: 3px 4px 0 var(--red-dark);
      letter-spacing: 1px;
    }
    header p {
      font-size: 14px;
      opacity: .88;
      font-weight: 600;
    }
    .header-wave {
      display: block;
      width: 100%;
      height: 36px;
      background: var(--cream);
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    /* ===== MAIN LAYOUT ===== */
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 16px 120px;
    }

    /* ===== SECTION TITLE ===== */
    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.25rem;
      color: var(--red);
      margin: 28px 0 14px;
    }
    .section-title span.line {
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, var(--red) 0%, transparent 100%);
      border-radius: 2px;
      opacity: .25;
    }

    /* ===== CUSTOMER CARD ===== */
    .customer-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: -4px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .input-group label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .5px;
      color: var(--red);
      text-transform: uppercase;
    }
    .input-group input {
      border: 2px solid #EEE;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 15px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      outline: none;
      transition: border-color .2s;
      background: var(--cream);
    }
    .input-group input:focus { border-color: var(--red-light); }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ===== MENU CARD ===== */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    @media (max-width: 768px) {
      .menu-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
      }
    }

    @media (max-width: 600px) {
      .menu-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
    }

    @media (max-width: 380px) {
      .menu-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
    }

    .menu-item {
      background: var(--white);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      transition: transform .2s, box-shadow .2s;
      display: flex;
      flex-direction: column;
      border: 2px solid transparent;
    }

    .menu-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 20px rgba(0,0,0,.12);
    }

    .menu-item.active {
      border: 2px solid var(--red);
      background: var(--red-bg);
    }

    .menu-item-image {
      width: 100%;
      height: 140px;
      background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }

    .menu-item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s;
    }

    .menu-item-image:hover img {
      transform: scale(1.08);
    }

    .menu-item-image::after {
      content: '🔍';
      position: absolute;
      font-size: 32px;
      opacity: 0;
      transition: opacity .2s;
      background: rgba(0,0,0,0.3);
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .menu-item-image:hover::after {
      opacity: 1;
    }

    .menu-item-content {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .item-name {
      font-weight: 800;
      font-size: 13px;
      line-height: 1.3;
      color: var(--dark);
      cursor: pointer;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color .2s;
    }

    .item-name:hover {
      color: var(--red);
    }

    .item-price {
      font-weight: 800;
      font-size: 14px;
      color: var(--red);
      cursor: pointer;
      transition: text-decoration .2s;
    }

    .item-price:hover {
      text-decoration: underline;
    }

    .item-btn-add {
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-weight: 800;
      font-size: 12px;
      cursor: pointer;
      transition: background .2s, transform .1s;
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .item-btn-add:hover {
      background: var(--red-dark);
    }

    .item-btn-add:active {
      transform: scale(.96);
    }

    /* ===== QTY STEPPER ===== */
    .qty-stepper {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--gray-light);
      border-radius: 100px;
      overflow: hidden;
    }

    /* ===== IMAGE FRAME FOR MENU ITEMS ===== */
    .menu-thumb {
      width: 76px;
      height: 76px;
      flex-shrink: 0;
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(180deg,#fff,#f6f6f6);
      padding: 6px;
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
      border: 4px solid rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .menu-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 6px;
    }
    .qty-btn {
      border: none;
      background: transparent;
      width: 34px;
      height: 34px;
      font-size: 20px;
      font-weight: 800;
      color: var(--red);
      cursor: pointer;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    .qty-btn:active { background: #E0E0E0; }
    .qty-btn.plus { background: var(--red); color: var(--white); }
    .qty-btn.plus:active { background: var(--red-dark); }
    .qty-display {
      min-width: 30px;
      text-align: center;
      font-weight: 800;
      font-size: 14px;
    }

    /* ===== CART SUMMARY ===== */
    .cart-summary {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .cart-empty {
      text-align: center;
      color: var(--gray);
      font-size: 14px;
      padding: 10px 0;
    }
    .cart-line {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 13px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 10px;
    }

    .cart-line:last-of-type { border-bottom: none; }

    .cart-line-name {
      font-weight: 800;
      color: var(--dark);
      font-size: 13px;
    }

    .cart-line-option {
      font-size: 11px;
      color: var(--gray);
      margin-top: 2px;
    }

    .cart-line-qty {
      text-align: right;
      white-space: nowrap;
      font-size: 11px;
      color: var(--gray);
    }

    .cart-line-price {
      color: var(--red);
      font-weight: 800;
      font-size: 13px;
    }
    .cart-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 2.5px solid var(--red);
    }
    .cart-total-label { font-family: 'Fredoka One', cursive; font-size: 1rem; }
    .cart-total-value { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: var(--red); }

    /* ===== ORDER BUTTON ===== */
    .btn-order {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #25D366;
      color: var(--white);
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      letter-spacing: .5px;
      cursor: pointer;
      margin-top: 16px;
      box-shadow: 0 4px 18px rgba(37,211,102,.35);
      transition: transform .15s, box-shadow .15s, background .15s;
    }
    .btn-order:hover { background: #1fba58; box-shadow: 0 6px 22px rgba(37,211,102,.45); }
    .btn-order:active { transform: scale(.97); }
    .btn-order svg { flex-shrink: 0; }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--dark);
      color: var(--white);
      padding: 12px 22px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      z-index: 999;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      color: var(--gray);
      font-size: 12px;
      padding: 16px;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes popIn {
      0%   { transform: scale(.8); opacity: 0; }
      70%  { transform: scale(1.06); }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop { animation: popIn .2s ease forwards; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        transform: translateY(40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* ===== MODAL PREVIEW FOTO ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      padding: 20px;
    }

    .modal-overlay.show {
      display: flex;
      animation: fadeIn .3s ease;
    }

    .modal-content {
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      animation: slideUp .3s ease;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.5);
      border: none;
      border-radius: 50%;
      color: var(--white);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1001;
      transition: background .2s;
    }

    .modal-close:hover {
      background: rgba(0, 0, 0, 0.7);
    }

    .modal-image {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .modal-info {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .modal-name {
      font-family: 'Fredoka One', cursive;
      font-size: 20px;
      color: var(--dark);
    }

    .modal-price {
      font-size: 18px;
      font-weight: 800;
      color: var(--red);
    }

    /* ===== OPTION MODAL (DINE IN / TAKE AWAY) ===== */
    .option-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1100;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .option-modal.show {
      display: flex;
      animation: fadeIn .3s ease;
    }

    .option-modal-content {
      background: var(--white);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 32px;
      width: 100%;
      max-width: 500px;
      animation: slideUp .3s ease;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .option-title {
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .option-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 8px 0;
    }

    .option-btn {
      padding: 16px 14px;
      border: 2px solid #EEE;
      background: var(--white);
      border-radius: 12px;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .option-btn:hover {
      border-color: var(--red);
      background: var(--red-bg);
    }

    .option-btn.selected {
      border-color: var(--red);
      background: var(--red);
      color: var(--white);
    }

    .option-btn-icon {
      font-size: 28px;
    }

    .option-qty {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 12px 0;
      background: var(--gray-light);
      padding: 12px;
      border-radius: 10px;
    }

    .option-qty-btn {
      width: 44px;
      height: 44px;
      border: none;
      background: var(--white);
      border-radius: 8px;
      font-weight: 800;
      font-size: 18px;
      color: var(--red);
      cursor: pointer;
      transition: background .2s;
    }

    .option-qty-btn:hover {
      background: #EEE;
    }

    .option-qty-display {
      min-width: 50px;
      text-align: center;
      font-weight: 800;
      font-size: 16px;
    }

    .option-confirm-btn {
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    .option-confirm-btn:hover {
      background: var(--red-dark);
    }

    .option-confirm-btn:active {
      transform: scale(.98);
    }

    /* ===== CATEGORY TABS ===== */
    .tab-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
      margin-top: 18px;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 7px 18px;
      border-radius: 100px;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      border: 2px solid #EEE;
      background: var(--white);
      color: var(--gray);
      transition: all .15s;
    }
    .tab.active {
      background: var(--red);
      color: var(--white);
      border-color: var(--red);
    }
    .menu-section { display: none; }
    .menu-section.visible { display: flex; flex-direction: column; gap: 10px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo-badge">🍜 Order Online</div>
    <h1>Warmindo</h1>
    <p>Pilih menu, isi nama & meja, langsung pesan!</p>
  </div>
  <span class="header-wave"></span>
</header>

<main>

  <!-- CUSTOMER INFO -->
  <div class="section-title">👤 Info Pemesan <span class="line"></span></div>
  <div class="customer-card">
    <div class="input-row">
      <div class="input-group">
        <label>Nama Kamu</label>
        <input type="text" id="custName" placeholder="Contoh: Budi" maxlength="30" />
      </div>
      <div class="input-group">
        <label>No. Meja</label>
        <input type="text" id="custTable" placeholder="Contoh: 3" maxlength="10" />
      </div>
    </div>
  </div>

  <!-- CATEGORY TABS -->
  <div class="tab-bar" id="tabBar">
    <div class="tab active" data-tab="makanan">🍜 Makanan</div>
    <div class="tab" data-tab="minuman">🥤 Minuman</div>
  </div>

  <!-- MENU: MAKANAN -->
  <div class="menu-section visible" id="sec-makanan">
    <div class="menu-grid" id="grid-makanan"></div>
  </div>

  <!-- MENU: MINUMAN -->
  <div class="menu-section" id="sec-minuman">
    <div class="menu-grid" id="grid-minuman"></div>
  </div>

  <!-- MODAL PREVIEW FOTO -->
  <div class="modal-overlay" id="photoModal">
    <button class="modal-close" onclick="closePhotoModal()">×</button>
    <div class="modal-content">
      <img id="photoModalImg" class="modal-image" src="" alt="">
      <div class="modal-info">
        <div class="modal-name" id="photoModalName"></div>
        <div class="modal-price" id="photoModalPrice"></div>
      </div>
    </div>
  </div>

  <!-- MODAL OPSI DINE IN / TAKE AWAY -->
  <div class="option-modal" id="optionModal">
    <div class="option-modal-content">
      <div class="option-title">Pilih Cara Pengambilan</div>
      <div class="option-buttons">
        <button class="option-btn" data-option="dine-in" onclick="selectOption('dine-in')">
          <span class="option-btn-icon">🪑</span>
          <span>Makan di Sini</span>
        </button>
        <button class="option-btn" data-option="take-away" onclick="selectOption('take-away')">
          <span class="option-btn-icon">🛍️</span>
          <span>Dibawa Pulang</span>
        </button>
      </div>
      <div class="option-qty">
        <button class="option-qty-btn" onclick="optionChangeQty(-1)">−</button>
        <span class="option-qty-display" id="optionQtyDisplay">1</span>
        <button class="option-qty-btn" onclick="optionChangeQty(1)">+</button>
      </div>
      <button class="option-confirm-btn" onclick="confirmAddToCart()">Tambah ke Pesanan</button>
      <button class="option-confirm-btn" style="background:#999;" onclick="closeOptionModal()">Batal</button>
    </div>
  </div>

  <!-- CART -->
  <div class="section-title">🛒 Ringkasan Pesanan <span class="line"></span></div>
  <div class="cart-summary">
    <div id="cartBody"><p class="cart-empty">Belum ada pesanan 😄</p></div>
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-value" id="cartTotal">Rp 0</span>
    </div>
    <button class="btn-order" id="btnOrder">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.129.558 4.122 1.532 5.856L0 24l6.335-1.521A11.935 11.935 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.817 9.817 0 01-5.001-1.366l-.357-.212-3.762.903.938-3.655-.233-.374A9.797 9.797 0 012.182 12C2.182 6.58 6.58 2.182 12 2.182c5.42 0 9.818 4.398 9.818 9.818 0 5.42-4.398 9.818-9.818 9.818z"/></svg>
      Pesan via WhatsApp
    </button>
  </div>

</main>

<div id="toast">✅ Item ditambahkan!</div>

<footer>© 2025 Warmindo — Made with ❤️</footer>

<script>
  // =============================================
  //  DATA MENU
  // =============================================
  const MENU = {
    makanan: [
      { id: 'm1',  name: 'Indomie goreng Biasalah',   price: 5000 },
      { id: 'm2',  name: 'Indomie goreng Doble',       price: 9000 },
      { id: 'm3',  name: 'Indomie goreng + Telur',     price: 7500 },
      { id: 'm4',  name: 'Indomie soto Biasalah',    price: 5000 },
      { id: 'm5',  name: 'Indomie soto Doble',        price: 9000 },
      { id: 'm6',  name: 'Indomie soto + Telur',      price: 7500 },
      { id: 'm7',  name: 'Sundukan Sosis',      price: 2000 },
      { id: 'm8',  name: 'Telur',               price: 3000 },
      { id: 'm9',  name: 'Ati',                 price: 3000 },
      { id: 'm10',  name: 'Usus',                price: 3000 },
      { id: 'm11',  name: 'Kepala',              price: 3000 },
      { id: 'm12',  name: 'Sayap',               price: 4000 },
      { id: 'm13', name: 'Bekicot',             price: 3000 },
      { id: 'm14', name: 'Telur Asin',          price: 3000 },
      { id: 'm15', name: 'Bakso',               price: 3000 },
    ],
    minuman: [
      { id: 'd1',  name: 'Kopi Hitam',          price: 3000 },
      { id: 'd2',  name: 'Kopi Susu',           price: 4000 },
      { id: 'd3',  name: 'Teh',                 price: 3000 },
      { id: 'd4',  name: 'Jahe',                price: 3000 },
      { id: 'd5',  name: 'Susu',                price: 3000 },
      { id: 'd6',  name: 'Nutrisari',           price: 3000 },
      { id: 'd7',  name: 'Jeruk Peras',         price: 3000 },
      { id: 'd8',  name: 'Milo',                price: 4000 },
      { id: 'd9',  name: 'Torabika Moca',       price: 4000 },
      { id: 'd10', name: 'Good Day',            price: 4000 },
      { id: 'd11', name: 'Bengbeng',            price: 4000 },
      { id: 'd12', name: 'Chocolatos',          price: 4000 },
    ]
  };

  // =============================================
  //  STATE
  // =============================================
  const cart = {};   // { id: { qty, option } }
  const allItems = [...MENU.makanan, ...MENU.minuman];
  const itemMap = {};
  allItems.forEach(i => itemMap[i.id] = i);

  const IMAGE_BY_NAME = {
    'Indomie goreng Biasalah': 'Indomie Goreng Biasalah.jpg',
    'Indomie goreng Doble': 'Indomie Goreng Doble.jfif',
    'Indomie goreng + Telur': 'Indomie Goreng + Telur.jpg',
    'Indomie soto Biasalah': 'Indomie Soto Biasalah.jfif',
    'Indomie soto Doble': 'Indomie Soto Doble.jfif',
    'Indomie soto + Telur': 'Indomie Soto + Telur.jfif',
    'Sundukan Sosis': 'Sundukan Sosis.jpeg',
    'Telur': 'Telur puyuh.jpg',
    'Ati': 'Ati Ampela.jfif',
    'Usus': 'Usus Ayam.jpg',
    'Kepala': 'Kepala ayam.jfif',
    'Sayap': 'Sayap Ayam.jpg',
    'Bekicot': 'Bekicot.jfif',
    'Telur Asin': 'Telur Asin.jfif',
    'Bakso': 'Bakso.jfif',
    'Kopi Hitam': 'Kopi Hitam.jfif',
    'Kopi Susu': 'Kopi Susu.jpg',
    'Teh': 'Teh.jfif',
    'Jahe': 'Jahe.jfif',
    'Susu': 'Susu.jfif',
    'Nutrisari': 'Nutrisari.png',
    'Jeruk Peras': 'Jeruk Peras.jpg',
    'Milo': 'Milo.jfif',
    'Torabika Moca': 'Torabika Moca.jpg',
    'Good Day': 'Good Day Capucino.jfif',
    'Bengbeng': 'Bengbeng.jfif',
    'Chocolatos': 'Chocolatos.jpg'
  };

  function getImageSrc(itemName) {
    const fileName = IMAGE_BY_NAME[itemName];
    if (!fileName) {
      return `https://via.placeholder.com/220x220?text=${encodeURIComponent(itemName)}`;
    }
    return encodeURI(`./${fileName}`);
  }

  // =============================================
  //  FORMAT RUPIAH
  // =============================================
  function formatRp(n) {
    return 'Rp ' + n.toLocaleString('id-ID');
  }
  function formatRpShort(n) {
    return (n / 1000) + 'rb';
  }

  // =============================================
  //  RENDER MENU ITEMS
  // =============================================
  function renderMenu(category) {
    const grid = document.getElementById('grid-' + category);
    grid.innerHTML = '';
    MENU[category].forEach(item => {
      const qty = cart[item.id]?.qty || 0;
      const div = document.createElement('div');
      div.className = 'menu-item' + (qty > 0 ? ' active' : '');
      div.id = 'item-' + item.id;
      div.innerHTML = `
        <div class="menu-item-image" onclick="openPhotoModal('${item.id}', '${item.name}', ${item.price})">
          <img src="${getImageSrc(item.name)}" alt="${item.name}" onerror="this.onerror=null;this.src='https://via.placeholder.com/220x220/ddd/999?text=Foto'">
        </div>
        <div class="menu-item-content">
          <div class="item-name" onclick="openOptionModal('${item.id}', '${item.name}', ${item.price})">${item.name}</div>
          <div class="item-price" onclick="openOptionModal('${item.id}', '${item.name}', ${item.price})">${formatRp(item.price)}</div>
          <button class="item-btn-add" onclick="openOptionModal('${item.id}', '${item.name}', ${item.price})">+ Pesan</button>
        </div>
      `;
      grid.appendChild(div);
    });
  }

  // =============================================
  //  PHOTO MODAL
  // =============================================
  function openPhotoModal(id, name, price) {
    document.getElementById('photoModalImg').src = getImageSrc(name);
    document.getElementById('photoModalImg').onerror = function() {
      this.onerror = null;
      this.src = 'https://via.placeholder.com/220x220/ddd/999?text=Foto';
    };
    document.getElementById('photoModalName').textContent = name;
    document.getElementById('photoModalPrice').textContent = formatRp(price);
    document.getElementById('photoModal').classList.add('show');
  }
  function closePhotoModal() {
    document.getElementById('photoModal').classList.remove('show');
  }

  // =============================================
  //  OPTION MODAL (DINE IN / TAKE AWAY)
  // =============================================
  let currentItemId = null;
  let currentItemName = null;
  let currentItemPrice = null;
  let selectedOption = 'dine-in';
  let optionQty = 1;

  function openOptionModal(id, name, price) {
    currentItemId = id;
    currentItemName = name;
    currentItemPrice = price;
    selectedOption = 'dine-in';
    optionQty = 1;
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector('[data-option="dine-in"]').classList.add('selected');
    document.getElementById('optionQtyDisplay').textContent = '1';
    document.getElementById('optionModal').classList.add('show');
  }
  function closeOptionModal() {
    document.getElementById('optionModal').classList.remove('show');
  }
  function selectOption(opt) {
    selectedOption = opt;
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector(`[data-option="${opt}"]`).classList.add('selected');
  }
  function optionChangeQty(delta) {
    optionQty = Math.max(1, optionQty + delta);
    document.getElementById('optionQtyDisplay').textContent = optionQty;
  }
  function confirmAddToCart() {
    if (!cart[currentItemId]) {
      cart[currentItemId] = { qty: 0, option: selectedOption };
    }
    cart[currentItemId].qty += optionQty;
    cart[currentItemId].option = selectedOption;
    showToast('✅ ' + currentItemName + ' ditambahkan!');
    renderMenu('makanan');
    renderMenu('minuman');
    renderCart();
    closeOptionModal();
  }

  // =============================================
  //  CHANGE QTY
  // =============================================
  function changeQty(id, delta) {
    if (!cart[id]) {
      cart[id] = { qty: 0, option: 'dine-in' };
    }
    const cur = cart[id].qty || 0;
    const next = Math.max(0, cur + delta);
    if (next === 0) delete cart[id];
    else cart[id].qty = next;

    // Update item card style
    const card = document.getElementById('item-' + id);
    if (card) {
      card.classList.toggle('active', next > 0);
    }

    if (delta > 0) showToast('✅ ' + itemMap[id].name + ' ditambahkan!');
    renderCart();
  }

  // =============================================
  //  RENDER CART
  // =============================================
  function renderCart() {
    const body = document.getElementById('cartBody');
    const totalEl = document.getElementById('cartTotal');
    const keys = Object.keys(cart);

    if (keys.length === 0) {
      body.innerHTML = '<p class="cart-empty">Belum ada pesanan 😄</p>';
      totalEl.textContent = 'Rp 0';
      return;
    }

    let html = '';
    let total = 0;
    keys.forEach(id => {
      const item = itemMap[id];
      const qty = cart[id].qty;
      const option = cart[id].option;
      const optionText = option === 'dine-in' ? '🍽️ Makan di Sini' : '🛍️ Dibawa Pulang';
      const sub = item.price * qty;
      total += sub;
      html += `<div class="cart-line">
        <div>
          <div class="cart-line-name">${item.name}</div>
          <div class="cart-line-option">${optionText}</div>
        </div>
        <div style="text-align: right;">
          <div class="cart-line-qty">${qty}x</div>
          <div class="cart-line-price">${formatRp(sub)}</div>
        </div>
      </div>`;
    });

    body.innerHTML = html;
    totalEl.textContent = formatRp(total);
  }

  // =============================================
  //  TOAST
  // =============================================
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // =============================================
  //  TABS
  // =============================================
  document.getElementById('tabBar').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    const key = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('visible'));
    document.getElementById('sec-' + key).classList.add('visible');
  });

  // =============================================
  //  ORDER VIA WHATSAPP
  // =============================================
  document.getElementById('btnOrder').addEventListener('click', () => {
    const name  = document.getElementById('custName').value.trim();
    const table = document.getElementById('custTable').value.trim();
    const keys  = Object.keys(cart);

    if (!name) { showToast('⚠️ Isi nama kamu dulu ya!'); return; }
    if (!table) { showToast('⚠️ Isi nomor meja dulu ya!'); return; }
    if (keys.length === 0) { showToast('⚠️ Pilih menu dulu ya!'); return; }

    let dineInList = '';
    let takeAwayList = '';
    let total = 0;

    keys.forEach(id => {
      const item = itemMap[id];
      const qty  = cart[id].qty;
      const option = cart[id].option;
      const sub  = item.price * qty;
      total += sub;

      const line = `  • ${item.name} x${qty} = ${formatRp(sub)}\n`;
      if (option === 'dine-in') {
        dineInList += line;
      } else {
        takeAwayList += line;
      }
    });

    const msg =
      `🍜 *PESANAN WARMINDO*\n` +
      `━━━━━━━━━━━━━━━━━━━━━━━━\n` +
      `👤 *Nama*      : ${name}\n` +
      `🪑 *Meja*      : ${table}\n` +
      `━━━━━━━━━━━━━━━━━━━━━━━━\n` +
      (dineInList ? `🍽️ *MAKAN DI SINI:*\n${dineInList}` : '') +
      (takeAwayList ? `🛍️ *DIBAWA PULANG:*\n${takeAwayList}` : '') +
      `━━━━━━━━━━━━━━━━━━━━━━━━\n` +
      `💰 *TOTAL : ${formatRp(total)}*\n` +
      `━━━━━━━━━━━━━━━━━━━━━━━━\n` +
      `Mohon segera diproses, terima kasih! 🙏`;

    const phone = '6281310760237';
    const url   = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  });

  // Close modals when clicking outside
  document.getElementById('photoModal').addEventListener('click', (e) => {
    if (e.target.id === 'photoModal') closePhotoModal();
  });
  document.getElementById('optionModal').addEventListener('click', (e) => {
    if (e.target.id === 'optionModal') closeOptionModal();
  });

  // =============================================
  //  INIT
  // =============================================
  renderMenu('makanan');
  renderMenu('minuman');
  renderCart();

  // Close modals on ESC key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closePhotoModal();
      closeOptionModal();
    }
  });
</script>
</body>
</html>
